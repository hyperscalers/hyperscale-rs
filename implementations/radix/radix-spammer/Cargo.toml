[package]
name = "hyperscale-spammer"
version.workspace = true
edition.workspace = true
description = "Transaction spammer for Hyperscale network"

[lib]
path = "src/lib.rs"

[[bin]]
name = "hyperscale-spammer"
path = "src/bin/spammer.rs"

[dependencies]
# Workspace dependencies
hyperscale-radix-types.workspace = true
hyperscale-types.workspace = true

# Radix dependencies
radix-common.workspace = true
radix-transactions.workspace = true
hyperscale-codec.workspace = true

# Async runtime
tokio.workspace = true
tokio-util = { version = "0.7", features = ["rt"] }

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-native-roots"] }

# Serialization
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
hex.workspace = true

# CLI
clap.workspace = true
humantime = "2"

# Utils
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
rand.workspace = true
rand_chacha.workspace = true
hdrhistogram.workspace = true
dashmap.workspace = true
parking_lot.workspace = true
futures.workspace = true

[dev-dependencies]
tokio-test = "0.4"
