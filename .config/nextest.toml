# Nextest profile used by CI (selected with `--profile ci`).
[profile.ci]
# Report every failure in a run rather than stopping at the first.
fail-fast = false
# Flag a test as slow after 2 minutes; kill it after 30. The cluster sims run
# for minutes, but anything past half an hour is a wedge, not a test.
slow-timeout = { period = "120s", terminate-after = 15 }

# Cluster sims hold multi-node state in memory; on 4-thread runners this caps
# them at two concurrent so they don't exhaust the 16GB of RAM.
[[profile.ci.overrides]]
filter = "package(hyperscale-simulation) or package(hyperscale-production)"
threads-required = 2
