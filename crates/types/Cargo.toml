[package]
name = "hyperscale-types"
version.workspace = true
edition.workspace = true
description = "Core types for Hyperscale consensus"

[dependencies]
# Cryptographic primitives
blake3.workspace = true
blst.workspace = true
hex.workspace = true
ed25519-dalek = { workspace = true, features = ["batch"] }
rand.workspace = true

# Merkle proof verification (Verify<ProvisionsContext>)
hyperscale-jmt.workspace = true

# Serialization
sbor.workspace = true

# Error handling
thiserror.workspace = true

# Diagnostics
tracing.workspace = true

# Radix transaction types
radix-common.workspace = true
radix-engine-interface.workspace = true
radix-transactions.workspace = true
radix-substate-store-interface.workspace = true

[features]
test-utils = []

[dev-dependencies]
proptest.workspace = true
syn = { version = "2.0.117", features = ["full", "parsing", "visit"] }

[lints]
workspace = true
